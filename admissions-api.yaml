openapi: 3.0.0
info:
  title: API de Admisiones SaludVital
  description: API para el registro y consulta de pacientes pre-registrados en la clinica SaludVital.
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
    description: Servidor de desarrollo

paths:
  /admissions:
    post:
      summary: Registrar un nuevo paciente
      description: Recibe los datos del paciente desde el sistema de Admisiones para ser procesados por Facturacion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - patient_id
                - full_name
                - appointment_date
                - insurance_code
              properties:
                patient_id:
                  type: string
                  example: "P123"
                full_name:
                  type: string
                  example: "Esteban Carvajal"
                appointment_date:
                  type: string
                  format: date
                  description: Fecha de la cita en formato YYYY-MM-DD
                  example: "2026-04-23"
                insurance_code:
                  type: string
                  enum: [IESS, PRIVADO, NINGUNO]
                  example: "IESS"
      responses:
        '201':
          description: Paciente registrado exitosamente
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - status
                  - patient_id
                properties:
                  message:
                    type: string
                  status:
                    type: integer
                  patient_id:
                    type: string
        '400':
          description: Datos invalidos
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - error
                properties:
                  message:
                    type: string
                  error:
                    type: string

    get:
      summary: Consultar pacientes por fecha
      description: Retorna la lista de pacientes registrados en una fecha especifica.
      parameters:
        - name: date
          in: query
          required: false
          description: Filtrar registros por esta fecha (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: "2026-04-23"
      responses:
        '200':
          description: Lista de pacientes encontrados
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - data
                properties:
                  status:
                    type: integer
                    example: 200
                  data:
                    type: array
                    items:
                      type: object
                      required:
                        - patient_id
                        - full_name
                        - appointment_date
                        - insurance_code
                      properties:
                        patient_id:
                          type: string
                        full_name:
                          type: string
                        appointment_date:
                          type: string
                          format: date
                        insurance_code:
                          type: string
